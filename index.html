<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>troll</title>
  <!-- Empty favicon to suppress the browser's default /favicon.ico request. -->
  <link rel="icon" href="data:,">
  <!-- Preconnect warms TCP/TLS to the Blob CDN before <video> ranges fetch. -->
  <link rel="preconnect" href="https://yzlkzb7bwjoetqbb.public.blob.vercel-storage.com">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="white"></div>
  <video id="reveal" muted playsinline      preload="auto"></video>
  <video id="loop"   muted playsinline loop preload="auto" autoplay></video>
  <div id="loading"></div>
  <!-- Eyelids as SVG paths so we can shape them like real eyelids
       (concave bottom on top eyelid, concave top on bottom eyelid) and
       animate the `d` attribute via CSS. -->
  <svg id="eyelids" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
    <path id="eyelid-top"/>
    <path id="eyelid-bottom"/>
  </svg>
  <!-- Trollolol fake-retro homepage. Fades in 1.5s after the white state.
       Pure layout — buttons and inputs are real <button>/<input> elements
       but not wired to any backend (non-functional v1). -->
  <section id="trollolol-page" aria-hidden="true">
    <div class="trolly-main">
      <img class="trolly-logo" src="/trololol.png" alt="Trollolol">
      <p class="trolly-tagline">Search 1,346,966,000 troll pages</p>
      <div class="trolly-search">
        <div class="trolly-search-main">
          <input class="trolly-input" type="text" autocomplete="off" aria-label="Search">
          <div class="trolly-buttons">
            <button type="button">Go Trolling</button>
            <button type="button">I'm Feeling Trolly</button>
          </div>
        </div>
        <div class="trolly-adv">
          <a href="#">Advanced Trolling</a>
          <a href="#">Trollferences</a>
        </div>
      </div>
      <div class="trolly-directory">
        <a class="trolly-dir-link" href="#">Troll Web Directory</a>
        <p class="trolly-dir-tag">the web organized for trolling</p>
      </div>
    </div>
    <div class="trolly-footer">
      <nav class="trolly-footer-links" aria-label="Footer">
        <a href="#">Cool Trolls</a><span>-</span>
        <a href="#">Add Trollolol to Your Site</a><span>-</span>
        <a href="#">Advertise Your Memes</a><span>-</span>
        <a href="#">Troll in Your Language</a><span>-</span>
        <a class="bold" href="#">All About Trolling</a>
      </nav>
      <p class="trolly-copyright">&copy;2001 Trollolol</p>
    </div>
  </section>
  <div id="mobile-blocker">This experience is desktop only.</div>
  <script src="/main.js" type="module"></script>
</body>
</html>
