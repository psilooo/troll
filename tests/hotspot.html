<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>hotspot tests</title>
  <style>
    body { font: 14px/1.5 ui-monospace, monospace; padding: 1rem; background: #111; color: #eee; }
    .pass { color: #5f5; } .fail { color: #f55; }
  </style>
</head>
<body>
  <h1>Hotspot hit-test cases (rectangular)</h1>
  <ol id="results"></ol>
  <script type="module">
    import { isInHotspot, HOTSPOT, VIDEO_W, VIDEO_H } from '/main.js';

    const results = document.getElementById('results');
    let passes = 0, fails = 0;

    function fakeEvent(clientX, clientY) { return { clientX, clientY }; }

    function check(label, viewport, hotspot, clickPx, expected) {
      const origW = window.innerWidth, origH = window.innerHeight;
      Object.defineProperty(window, 'innerWidth',  { value: viewport[0], configurable: true });
      Object.defineProperty(window, 'innerHeight', { value: viewport[1], configurable: true });
      Object.assign(HOTSPOT, hotspot);
      const got = isInHotspot(fakeEvent(...clickPx));
      const ok = (got === expected);
      const li = document.createElement('li');
      li.className = ok ? 'pass' : 'fail';
      li.textContent = `${ok ? 'PASS' : 'FAIL'}  ${label} — expected ${expected}, got ${got}`;
      results.appendChild(li);
      ok ? passes++ : fails++;
      Object.defineProperty(window, 'innerWidth',  { value: origW, configurable: true });
      Object.defineProperty(window, 'innerHeight', { value: origH, configurable: true });
    }

    // 1. Center of a 20%×20% rect at viewport == video aspect: hit.
    check('center hit at 1920x1080', [1920, 1080], { x: 0.4, y: 0.4, w: 0.2, h: 0.2 },
      [1920 * 0.5, 1080 * 0.5], true);

    // 2. Same rect, 21:9 ultrawide. Cover scales horizontally; the rect's
    //    video-px center still sits at viewport center.
    check('center hit at 2560x1080 (21:9)', [2560, 1080], { x: 0.4, y: 0.4, w: 0.2, h: 0.2 },
      [2560 * 0.5, 1080 * 0.5], true);

    // 3. 21:9 viewport, click at far-left lands outside the cropped-in rect.
    check('far-left miss at 2560x1080', [2560, 1080], { x: 0.4, y: 0.4, w: 0.2, h: 0.2 },
      [256, 540], false);

    // 4. Off-center rect in the upper-left of the video, hit at its center.
    check('upper-left rect hit', [1920, 1080], { x: 0.1, y: 0.1, w: 0.1, h: 0.1 },
      [1920 * 0.15, 1080 * 0.15], true);

    // 5. One pixel past the right edge of the rect: miss (closed boundary check).
    check('just outside right edge', [1920, 1080], { x: 0.4, y: 0.4, w: 0.2, h: 0.2 },
      [1920 * 0.6 + 1, 1080 * 0.5], false);

    // 6. Portrait viewport (vertical fill, horizontal crop). Rect center
    //    maps to viewport center.
    check('portrait viewport hit at 1080x1920', [1080, 1920], { x: 0.4, y: 0.4, w: 0.2, h: 0.2 },
      [540, 960], true);

    // 7. Live calibration: monitor rect, click on monitor center → hit.
    check('monitor center at 1920x1080', [1920, 1080], { x: 0.34, y: 0.12, w: 0.31, h: 0.22 },
      [1920 * 0.50, 1080 * 0.23], true);

    // 8. Live calibration: click on chair area (well below the monitor) → miss.
    check('chair area at 1920x1080', [1920, 1080], { x: 0.34, y: 0.12, w: 0.31, h: 0.22 },
      [1920 * 0.50, 1080 * 0.65], false);

    const summary = document.createElement('p');
    summary.textContent = `${passes} pass, ${fails} fail`;
    summary.className = fails === 0 ? 'pass' : 'fail';
    results.appendChild(summary);
  </script>
</body>
</html>
